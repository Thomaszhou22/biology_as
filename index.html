<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AS Biology Quiz</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        #quiz-container { width: 480px; max-width: 95vw; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 10px; }
        #header-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
        #progress-bar { width: 100%; background: #e9ecef; border-radius: 10px; overflow: hidden; height: 8px; display: none; margin-bottom: 10px; }
        #progress-fill { height: 100%; background: #007bff; border-radius: 10px; transition: width 0.3s; width: 0%; }
        #score-display { display: none; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 10px; font-size: 14px; color: #555; }
        #score-display span { background: #f0f2f5; padding: 4px 12px; border-radius: 20px; }
        #question-counter { font-weight: bold; font-size: 15px; text-align: center; }
        #question-box { border-radius: 8px; background: #f8f9fa; padding: 15px; margin: 15px 0; border-left: 5px solid #007bff; min-height: 140px; }
        #q-text { margin-bottom: 8px; }
        #q-image { max-width: 100%; max-height: 300px; border-radius: 6px; margin: 8px 0; display: block; margin-left: auto; margin-right: auto; cursor: zoom-in; transition: opacity 0.2s; }
        .zoom-hint { text-align: center; margin-top: 4px; }
        .zoom-btn { display: block; margin: 6px auto 0; padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px; background: #f0f0f0; font-size: 13px; cursor: pointer; color: #555; }
        .zoom-btn:hover { background: #e0e0e0; }
        .image-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
        .image-overlay img { max-width: 95vw; max-height: 95vh; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
        .option-btn { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; text-align: center; transition: 0.2s; font-size: 15px; font-weight: bold; }
        .option-btn:hover:not(:disabled) { background: #eef2f7; border-color: #007bff; }
        .options-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .option-btn.correct-answer { background: #d4edda; border-color: #28a745; color: #155724; }
        .option-btn.wrong-answer { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .status-msg { font-weight: bold; text-align: center; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
        .status-msg.correct { background: #d4edda; color: #155724; }
        .status-msg.incorrect { background: #f8d7da; color: #721c24; }
        #info-panel { text-align: center; padding: 30px 0; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; background: #2f3542; color: white; margin-top: 16px; }
        .btn-action:hover { background: #1e2229; }
        #wrong-book-btn { position: fixed; right: 15px; top: 15px; z-index: 1000; padding: 8px 14px; border-radius: 8px; border: 1px solid #d1d8e0; background: #fff; color: #333; font-size: 13px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: background 0.2s, transform 0.2s; }
        #wrong-book-btn:hover { background: #eef2f7; transform: scale(1.05); }
        #wrong-book-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3500; padding: 20px; box-sizing: border-box; }
        #wrong-book-panel { background: #fff; border-radius: 16px; padding: 20px; width: min(900px, 92vw); max-height: 85vh; overflow: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
        #wrong-book-panel h2 { margin: 0 0 16px; font-size: 1.25rem; text-align: center; }
        #wrong-book-list { margin-bottom: 16px; }
        .wrong-book-item { border: 1px solid #ddd; border-radius: 12px; padding: 14px; margin-bottom: 14px; text-align: left; }
        .wrong-book-meta { display: flex; flex-wrap: wrap; gap: 12px; align-items: baseline; margin-bottom: 10px; font-size: 0.95rem; }
        .wrong-book-item .wrong-book-meta strong { margin-right: 6px; }
        .wrong-book-question { margin-bottom: 10px; }
        .wrong-book-answer { font-size: 0.95rem; }
        .wrong-book-footer-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .wrong-book-footer-actions button { flex: 1; min-width: 120px; padding: 10px 14px; border-radius: 8px; border: 1px solid #d1d8e0; background: #f8f9fa; font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer; }
        .wrong-book-footer-actions button:hover { background: #eef2f7; }
        #wrong-book-clear-all { border-color: #e8b4b4; background: #fff5f5; color: #a61e1e; }
        #wrong-book-clear-all:hover { background: #ffe8e8; border-color: #d64545; }
